<!doctype html>
<html lang="en" style="height:100%;">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../favicons/favicon.png">
    <title>alt games portal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Bootstrap -->
    <link href="../css/bootstrap-4.0.0.css" rel="stylesheet">
    <link href="../style.css" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/5.0.4/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/5.0.4/firebase-database.js"></script>
    <script src="../dataRetreve.js"></script>
    <script src="script.js"></script>

    <style>
        #gameView iframe {
            width: 100%;
            height: 80vh;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: #111;
        }
        .section-title {
            font-weight: 800;
            margin-top: 40px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body style="padding-top: 80px;">
    
    <!-- Navbar -->
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark card-glass">
        <div class="container">
            <a class="navbar-brand" href="/">alt games portal</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <form class="form-inline ml-auto my-2 my-lg-0">
                    <input class="form-control mr-sm-2" type="search" placeholder="Search..." aria-label="Search" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px;">
                    <a href="/about" class="nav-link">About</a>
                    <a href="/contact" class="nav-link">Contact</a>
                    <a href="/privacy" class="nav-link">Privacy</a>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row">
            <div class="col-12 animate-in">
                <h2 id="title" class="section-title mb-4">Loading Game...</h2>
                <div id="gameView" class="mb-5">
                    <!-- Iframe injected by script.js -->
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <h3 class="section-title">Similar Games</h3>
                <div id="scrollView" class="row">
                    <script>
                        requestCurrentCategory();
                        setScrollListener();
                    </script>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/jquery-3.2.1.min.js"></script>
    <script src="../js/popper.min.js"></script> 
    <script src="../js/bootstrap-4.0.0.js"></script>
</body>
</html>
