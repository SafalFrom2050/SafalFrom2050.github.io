<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>alt games portal: GenAI-Mode</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Outfit:wght@300;400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
    <link rel="manifest" href="/favicons/site.webmanifest">
    
    <!-- Bootstrap -->
    <link href="../css/bootstrap-4.0.0.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary-bg: #0f172a;
            --accent: #22d3ee;
            --glass-blur: blur(15px);
            --font-retro: 'Press Start 2P', system-ui;
        }

        body {
            background-color: var(--primary-bg);
            color: white;
            font-family: var(--font-retro);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            background: radial-gradient(circle at top left, #3a0d13 0%, #0f172a 100%);
        }

        /* Animated background shapes */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
        }
        .shape-1 {
            width: 300px;
            height: 300px;
            background: #ff4757;
            top: -100px;
            left: -100px;
            animation: move 20s infinite alternate;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            background: #db2777;
            bottom: -150px;
            right: -150px;
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            background: #000000;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            animation: ease-reveal 0.5s ease-in forwards;
        }

        .sprite-icon {
            width: 100px;
            height: 100px;
            background-image: url('../images/frames.png');
            background-size: 1500% 100%;
            background-position: 0 0;
            animation: sprite-play 1.5s steps(14) 2 forwards;
        }

        @keyframes sprite-play {
            from { background-position: 0 0; }
            to { background-position: -1400% 0; }
        }

        @keyframes ease-reveal {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 8px;
            letter-spacing: 0;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
        }

        .brand-alt { color: var(--accent); font-family: var(--font-retro); font-size: 14px; letter-spacing: -1px; }
        .brand-games { color: #ff4757; font-family: 'Montserrat', sans-serif; letter-spacing: -1px; font-size: 17px; }

        .bio-text {
            opacity: 0.8;
            font-size: 8px;
            max-width: 320px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .section-header {
            font-size: 10px;
            color: white;
            text-align: center;
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 0 16px;
            flex-wrap: wrap;
            animation: fadeInDown 0.5s ease-out;
            width: 100%;
            max-width: 450px;
        }

        .typing-container {
            display: inline-block;
            position: relative;
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: break-word;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink-caret 0.75s step-end infinite;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes blink-caret {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeInUp 0.5s ease-out;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            text-decoration: none !important;
            color: white !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-card:hover::after {
            left: 100%;
        }

        .link-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .link-content {
            flex-grow: 1;
        }

        .link-title {
            font-weight: 600;
            font-size: 10px;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            line-height: 1.4;
        }

        .link-subtitle {
            font-size: 7px;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 10px;
            display: inline-block;
            color: var(--accent);
            text-transform: uppercase;
        }

        .play-icon {
            font-size: 24px;
            color: var(--accent);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-card:hover .play-icon {
            opacity: 1;
            transform: translateX(0);
        }

        .app-button {
            margin-top: 20px;
            background: white;
            color: black;
            border-radius: 20px;
            padding: 12px 20px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-size: 9px;
        }

        .app-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            background: #f8fafc;
            color: black;
            text-decoration: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 0;
            max-width: 450px;
            width: 100%;
            text-align: left;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-banner {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-card h2 {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 12px;
            color: white;
            line-height: 1.4;
        }

        .modal-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 10px;
            color: white;
            flex-wrap: wrap;
        }

        #modalCategory {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 9px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
        }

        .modal-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal-description {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 25px;
            color: white;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .modal-description::-webkit-scrollbar {
            width: 4px;
        }
        .modal-description::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .modal-btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-btn {
            padding: 14px;
            border-radius: 15px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 10px;
            border: none;
            width: 100%;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-download {
            background: white;
            color: black;
        }

        .btn-download:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
            text-decoration: none;
            color: black;
        }

        .btn-close {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-close:hover {
            background: rgba(255,255,255,0.2);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loader {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: var(--accent);
            color: var(--accent);
            box-shadow: 9999px 0 0 0 var(--accent);
            animation: dot-pulse 1.5s infinite linear;
        }

        @keyframes dot-pulse {
            0% { box-shadow: 9999px 0 0 -5px var(--accent); }
            30% { box-shadow: 9999px 0 0 2px var(--accent); }
            60%, 100% { box-shadow: 9999px 0 0 -5px var(--accent); }
        }
        @media (max-width: 480px) {
            .section-header {
                font-size: 8px !important;
                margin: 20px 0 10px 0 !important;
            }
            .typing-container {
                max-width: 100% !important;
                text-align: center !important;
            }
            .cursor {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="profile-section">
        <div class="profile-img">
            <div class="sprite-icon"></div>
        </div>
        <div class="profile-info">
            <h1><span class="brand-alt">alt</span> <span class="brand-games">games portal</span></h1>
            <p class="bio-text">Watch AI Hallucinate</p>
        </div>
        <a href="https://play.google.com/store/apps/details?id=dif.instantgames" class="app-button">
            <i class="material-icons">download</i>
            Get App on Play Store
        </a>
    </div>

    <div class="section-header">
        " <div class="typing-container" id="typewriter">AI AGENTS CREATE GAMES LIKE THESE IN SECONDS</div> "
    </div>

    <div class="links-container" id="linksList">
        <div id="loader">
            <div class="dot-pulse"></div>
        </div>
    </div>

    <!-- Modal Dialog -->
    <div id="appModal" class="modal-overlay">
        <div class="modal-card">
            <img id="modalBanner" class="modal-banner" src="" alt="Game Preview">
            <div class="modal-body">
                <h2 id="modalTitle">Game Title</h2>
                <div class="modal-meta">
                    <span id="modalCategory"><i class="material-icons" style="font-size: 14px;">category</i> Arcade</span>
                    <span id="modalStats"><i class="material-icons" style="font-size: 14px;">play_arrow</i> 1.2k plays</span>
                </div>
                <div id="modalDescription" class="modal-description">
                    Description goes here...
                </div>
                <div class="modal-btn-container">
                    <a href="https://play.google.com/store/apps/details?id=dif.instantgames" class="modal-btn btn-download">Download to Play</a>
                    <button class="modal-btn btn-close" onclick="closeModal()">Not Vibing</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-check-compat.js"></script>
    
    <script>
        // Set configuration
        var config = {
            apiKey: "AIzaSyCa21G1mEhrJKmoPLRZ8hbJikyI4lGdY5Y",
            authDomain: "dif-instantgames.firebaseapp.com",
            databaseURL: "https://dif-instantgames.firebaseio.com/",
            projectId: "dif-instantgames",
            storageBucket: "dif-instantgames.appspot.com",
            appId: "1:555879374010:web:405a0d17f2b1b20e85b683"
        };
        firebase.initializeApp(config);

        // Optional App Check
        try {
            const appCheck = firebase.appCheck();
            appCheck.activate(
                new firebase.appCheck.ReCaptchaEnterpriseProvider('6LerGoMsAAAAAHNLdx75KLqssqSTGG4RJRIB0BUs'),
                true
            );
        } catch(e) { console.warn("AppCheck failed to init", e); }
        
        // --- Multiline Typewriter Effect ---
        function initTypewriter() {
            const container = document.getElementById('typewriter');
            const fullText = container.innerText;
            container.innerText = "";
            container.style.opacity = "1";
            
            let i = 0;
            function type() {
                if (i < fullText.length) {
                    container.innerHTML = fullText.substring(0, i + 1) + '<span class="cursor"></span>';
                    i++;
                    setTimeout(type, 40 + Math.random() * 30); // Random typing speed for natural GenAI feel
                } else {
                    container.innerHTML = fullText + '<span class="cursor"></span>';
                }
            }
            
            // Start after a short delay
            setTimeout(type, 800);
        }
        
        // Initial call
        window.addEventListener('DOMContentLoaded', initTypewriter);

        const linksList = document.getElementById('linksList');
        const db = firebase.firestore();
        const rtdb = firebase.database();
        const CACHE_KEY = 'bio_games_cache';

        function renderGames(games) {
            const loader = document.getElementById('loader');
            if (loader) loader.remove();
            
            linksList.innerHTML = "";

            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.style.animationDelay = (index * 0.1) + 's';
                card.style.cursor = 'pointer';

                card.innerHTML = `
                    <img src="${game.imageUrl}" class="link-img" alt="${game.title}" onerror="this.src='../images/cover.png'">
                    <div class="link-content">
                        <p class="link-title">${game.title}</p>
                        <p class="link-subtitle">${game.category || 'AI Generated'}</p>
                    </div>
                    <i class="material-icons play-icon">play_arrow</i>
                `;

                card.onclick = () => openModal(game);
                linksList.appendChild(card);
            });
        }

        const modal = document.getElementById('appModal');
        const mBanner = document.getElementById('modalBanner');
        const mTitle = document.getElementById('modalTitle');
        const mCategory = document.getElementById('modalCategory');
        const mStats = document.getElementById('modalStats');
        const mDesc = document.getElementById('modalDescription');

        function openModal(game) {
            mBanner.src = game.imageUrl;
            mTitle.innerText = game.title;
            mCategory.innerHTML = `<i class="material-icons" style="font-size: 14px;">category</i> ${game.category || 'AI Game'}`;
            
            const plays = game.playCount || 0;
            const rating = game.rating ? ` | ${game.rating} stars` : '';
            
            // Only show play count if it's over 100
            if (plays > 100) {
                mStats.innerHTML = `<i class="material-icons" style="font-size: 14px;">play_arrow</i> ${plays} plays${rating}`;
            } else if (game.rating) {
                mStats.innerHTML = `<i class="material-icons" style="font-size: 14px;">star</i> ${game.rating} stars`;
            } else {
                mStats.innerHTML = ``; // Hide stats if no significant data
            }
            
            mDesc.innerText = game.description || "No description available for this AI game.";
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close on backdrop click
        modal.onclick = function(e) {
            if (e.target === modal) closeModal();
        };

        function fetchAndCache(newRtdbTimestamp) {
            db.collection('ai_games')
              .where('isPublished', '==', true)
              .where('publishStatus', '==', 'complete')
              .where('bio_shared', '==', true)
              .orderBy('createdAt', 'desc')
              .limit(10)
              .get()
              .then(function(querySnapshot) {
                const games = [];
                querySnapshot.forEach(function(doc) {
                    const data = doc.data();
                    games.push({
                        id: doc.id,
                        title: data.title,
                        category: data.category,
                        description: data.description,
                        playCount: data.stats ? data.stats.playCount : 0,
                        rating: data.stats ? data.stats.averageRating : 0,
                        isPortrait: data.isPortrait || false,
                        imageUrl: (data.screenshotUrls && data.screenshotUrls.length > 0) ? data.screenshotUrls[0] : '../images/cover.png'
                    });
                });

                // Update Cache with fresh games and the timestamp from RTDB
                const cacheData = {
                    rtdbTimestamp: newRtdbTimestamp,
                    localTimestamp: Date.now(),
                    games: games
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                
                renderGames(games);
            }).catch(function(error) {
                console.error("Error getting documents: ", error);
                const loader = document.getElementById('loader');
                if (loader) loader.innerHTML = '<p style="color:rgba(255,255,255,0.5);font-size:12px;">Failed to load games.</p>';
            });
        }

        // --- Hybrid Logic ---
        const cachedPayload = localStorage.getItem(CACHE_KEY);
        
        // Always check RTDB for the master timestamp
        rtdb.ref('/Game Collection/bio_update_timestamp').once('value').then(snapshot => {
            const masterTimestamp = snapshot.val() || 0;
            
            if (cachedPayload) {
                try {
                    const cache = JSON.parse(cachedPayload);
                    // SMART REFRESH: If cache is missing description, it's from the old version. Force refetch.
                    const needsUpgrade = cache.games && cache.games.length > 0 && !cache.games[0].description;
                    
                    // If local cache matches master timestamp AND has modern data, use it
                    if (!needsUpgrade && cache.rtdbTimestamp >= masterTimestamp && cache.games && cache.games.length > 0) {
                        console.log("Loading bio games from valid cache (Master TS: " + masterTimestamp + ")");
                        renderGames(cache.games);
                    } else {
                        console.log("Cache outdated. Refetching from Firestore...");
                        fetchAndCache(masterTimestamp);
                    }
                } catch (e) {
                    fetchAndCache(masterTimestamp);
                }
            } else {
                fetchAndCache(masterTimestamp);
            }
        }).catch(err => {
            console.warn("RTDB Check failed, falling back to local storage or live fetch", err);
            // Fallback: If RTDB fails, try using cache even if we can't verify it
            if (cachedPayload) {
                try {
                    renderGames(JSON.parse(cachedPayload).games);
                } catch(e) { 
                    fetchAndCache(Date.now()); 
                }
            } else {
                fetchAndCache(Date.now()); // Use current time as mock TS
            }
        });
    </script>
</body>
</html>
