<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>alt games portal: GenAI-Mode</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
    <link rel="manifest" href="/favicons/site.webmanifest">
    
    <!-- Bootstrap -->
    <link href="../css/bootstrap-4.0.0.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --glass-blur: blur(12px);
        }

        body {
            background: var(--primary-bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        }

        /* Animated background shapes */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
        }
        .shape-1 {
            width: 300px;
            height: 300px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
            animation: move 20s infinite alternate;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            bottom: -150px;
            right: -150px;
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            background: #000000;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            animation: ease-reveal 0.8s ease-in forwards;
        }

        .sprite-icon {
            width: 100px;
            height: 100px;
            background-image: url('../images/frames.png');
            background-size: 1500% 100%;
            background-position: 0 0;
            animation: sprite-play 1.5s steps(14) 2 forwards;
        }

        @keyframes sprite-play {
            from { background-position: 0 0; }
            to { background-position: -1400% 0; }
        }

        @keyframes ease-reveal {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .bio-text {
            opacity: 0.8;
            font-size: 14px;
            max-width: 300px;
            margin: 0 auto;
        }

        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            text-decoration: none !important;
            color: white !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-card:hover::after {
            left: 100%;
        }

        .link-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .link-content {
            flex-grow: 1;
        }

        .link-title {
            font-weight: 600;
            font-size: 17px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .link-subtitle {
            font-size: 12px;
            opacity: 0.6;
            margin: 0;
        }

        .play-icon {
            font-size: 24px;
            color: var(--accent);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-card:hover .play-icon {
            opacity: 1;
            transform: translateX(0);
        }

        .app-button {
            margin-top: 20px;
            background: white;
            color: black;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none !important;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .app-button:hover {
            transform: scale(1.05);
            background: #f8fafc;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loader {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: var(--accent);
            color: var(--accent);
            box-shadow: 9999px 0 0 0 var(--accent);
            animation: dot-pulse 1.5s infinite linear;
        }

        @keyframes dot-pulse {
            0% { box-shadow: 9999px 0 0 -5px var(--accent); }
            30% { box-shadow: 9999px 0 0 2px var(--accent); }
            60%, 100% { box-shadow: 9999px 0 0 -5px var(--accent); }
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="profile-section">
        <div class="profile-img">
            <div class="sprite-icon"></div>
        </div>
        <div class="profile-info">
            <h1>alt games portal</h1>
            <p class="bio-text">Kinds of game you can create</p>
        </div>
        <a href="https://play.google.com/store/apps/details?id=dif.instantgames" class="app-button">
            <i class="material-icons">download</i>
            Get App on Play Store
        </a>
    </div>

    <div class="links-container" id="linksList">
        <div id="loader">
            <div class="dot-pulse"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-check-compat.js"></script>
    
    <script>
        // Set configuration
        var config = {
            apiKey: "AIzaSyCa21G1mEhrJKmoPLRZ8hbJikyI4lGdY5Y",
            authDomain: "dif-instantgames.firebaseapp.com",
            databaseURL: "https://dif-instantgames.firebaseio.com/",
            projectId: "dif-instantgames",
            storageBucket: "dif-instantgames.appspot.com",
            appId: "1:555879374010:web:405a0d17f2b1b20e85b683"
        };
        firebase.initializeApp(config);

        // Optional App Check (mirrored from gameView)
        try {
            const appCheck = firebase.appCheck();
            appCheck.activate(
                new firebase.appCheck.ReCaptchaEnterpriseProvider('6LerGoMsAAAAAHNLdx75KLqssqSTGG4RJRIB0BUs'),
                true
            );
        } catch(e) { console.warn("AppCheck failed to init", e); }

        const linksList = document.getElementById('linksList');
        const db = firebase.firestore();

        // Fetch AI games
        db.collection('ai_games')
          .where('isPublished', '==', true)
          .where('publishStatus', '==', 'complete')
          .where('bio_shared', '==', true)
          .orderBy('createdAt', 'desc')
          .limit(10)
          .get()
          .then(function(querySnapshot) {
            document.getElementById('loader').remove();
            let index = 0;
            querySnapshot.forEach(function(doc) {
                const game = doc.data();
                const id = doc.id;
                const isPortrait = game.isPortrait || false;
                const imageUrl = (game.screenshotUrls && game.screenshotUrls.length > 0) ? game.screenshotUrls[0] : '../images/cover.png';

                const card = document.createElement('a');
                card.className = 'link-card';
                card.style.animationDelay = (index * 0.1) + 's';
                
                // Deep link logic
                const deepLinkUrl = `../gameView/?id=${id}&isPortrait=${isPortrait}`;
                card.href = deepLinkUrl;

                card.innerHTML = `
                    <img src="${imageUrl}" class="link-img" alt="${game.title}" onerror="this.src='../images/cover.png'">
                    <div class="link-content">
                        <p class="link-title">${game.title}</p>
                        <p class="link-subtitle">${game.category || 'AI Generated'}</p>
                    </div>
                    <i class="material-icons play-icon">play_arrow</i>
                `;

                // Handle Android Deep Linking Force
                card.onclick = function(e) {
                    var ua = navigator.userAgent.toLowerCase();
                    if (ua.indexOf("android") > -1) {
                        e.preventDefault();
                        const intentUrl = `intent://gameView/?id=${id}&isPortrait=${isPortrait}#Intent;package=dif.instantgames;scheme=https;S.browser_fallback_url=${encodeURIComponent(window.location.origin + '/gameView/?id=' + id + '&isPortrait=' + isPortrait)};end`;
                        window.location.href = intentUrl;
                    }
                };

                linksList.appendChild(card);
                index++;
            });
        }).catch(function(error) {
            console.error("Error getting documents: ", error);
            document.getElementById('loader').innerHTML = '<p style="color:rgba(255,255,255,0.5);font-size:12px;">Failed to load games. Check connection.</p>';
        });
    </script>
</body>
</html>
