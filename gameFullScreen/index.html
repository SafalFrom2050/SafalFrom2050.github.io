<!doctype html>
<html lang="en" style="height:100%;">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/x-icon" href="/favicons/favicon.png">
    <link rel="stylesheet" href="style.css">
    <title>alt games portal</title>
</head>
<body>
    <div id="loaderContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease;">
        <div class="loader-sprite"></div>
    </div>

    <div class="floating" id="floatingControls" style="display: none;">
        <div id="full-screen-btn" onclick="goFullScreen();">
            <h4 id="msg">Full Screen</h4>
            <img src="images/fullscreen.png" alt="Full Screen">
        </div>
    </div>

    <div id="gameView"></div>

    <!-- Firebase System -->
    <script src="https://www.gstatic.com/firebasejs/5.0.4/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/5.0.4/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
