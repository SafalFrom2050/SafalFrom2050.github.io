<body style="padding-top: 80px;">



    
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark">
        <div class="container">

    <div class="container mt-4">
        <div class="glass-container mb-5 animate-in">
            <h1 class="h2 mb-4">Discover Your Next Favorite Game</h1>
            <div class="row align-items-center">
                <div class="col-12">
                    <div class="d-flex align-items-center mb-3">
                        <button class="arrow-btn mr-2" onclick="document.getElementById('categoriesTab').scrollBy({ left: -150, behavior: 'smooth' });">
                            <i class="material-icons">chevron_left</i>
                        </button>
                        <div class="scrollmenu flex-grow-1" id="categoriesTab">

                        </div>
                        <button class="arrow-btn ml-2" onclick="document.getElementById('categoriesTab').scrollBy({ left: 150, behavior: 'smooth' });">
                            <i class="material-icons">chevron_right</i>
                        </button>
                    </div>
                </div>
                <div class="col-12">
                    <div id="resultsInfo" class="text-muted small"></div>
                </div>
            </div>
        </div>

        <!-- Games Grid -->
        <div id="scrollView" class="row"></div>
        
        <!-- Loader -->
        <div id="loaderContainer" class="col-12 text-center p-5">
            <div class="loader-sprite mx-auto"></div>
        </div>
        
        <!-- Load More -->
        <div class="text-center my-5" id="loadMoreContainer" style="display: none;">

        </div>
    </div>

    <footer class="mt-5 py-5 text-center border-top border-glass">

    <!-- Scripts -->
    <script src="../js/jquery-3.2.1.min.js"></script>
    <script src="../js/popper.min.js"></script> 
    <script src="../js/bootstrap-4.0.0.js"></script>
    
    <script>
        let currentCategory = 'all';
        let isFetching = false;
        let isSearchMode = false;
        let shuffledQueue = []; // Session-level queue for randomized games

        async function init() {
            // Check for search query in URL
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const category = urlParams.get('cat');

            // Load Categories
            const categories = await firestoreService.fetchCategories();
            const tab = document.getElementById('categoriesTab');
            
            categories.forEach(cat => {
                const chip = document.createElement('div');
                // Determine if this chip should be active (matching URL param or default to 'all')
                const isActive = (category && category === cat) || (!category && cat === 'all');
                chip.className = 'category-chip' + (isActive ? ' active' : '');
                chip.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                chip.onclick = () => loadCategory(cat, chip);
                tab.appendChild(chip);
            });


            if (query) {
                document.getElementById('gameSearch').value = query;
                performSearch(query);
            } else if (category && category !== 'all') {
                loadCategory(category);
            } else {
                loadCategory('all');
            }
        }

        async function loadCategory(cat, element) {
            document.querySelectorAll('.category-chip').forEach(c => {
                c.classList.remove('active');
                if (element && c === element) {
                    c.classList.add('active');
                } else if (!element) {
                    // Fallback for initial load: match by text
                    if (c.textContent.toLowerCase() === cat.toLowerCase()) {
                        c.classList.add('active');
                    }
                }
            });
            
            isSearchMode = false;
            currentCategory = cat;
            shuffledQueue = []; // Reset the randomized pool
            document.getElementById('scrollView').innerHTML = firestoreService.getSkeletonGrid(24, "col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2");
            document.getElementById('resultsInfo').innerHTML = '';
            
            await fetchNextBatch();
        }

        async function performSearch(query) {
            if (!query || query.length < 3) return;
            isSearchMode = true;
            document.getElementById('scrollView').innerHTML = firestoreService.getSkeletonGrid(12, "col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2");
            document.getElementById('loaderContainer').style.display = 'none';
            document.getElementById('loadMoreContainer').style.display = 'none';
            document.getElementById('resultsInfo').innerHTML = '';

            const games = await firestoreService.searchGames(query, 24);
            renderGames(games, false);
            document.getElementById('resultsInfo').innerHTML = 'Found ' + games.length + ' results for "' + query + '"';
        }

        function triggerSearch() {
            const query = document.getElementById('gameSearch').value;
            if (query.length >= 3) {
                // Update URL without reload
                const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(query);
                window.history.pushState({path:newurl},'',newurl);
                performSearch(query);
            } else if (query.length === 0) {
                const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.pushState({path:newurl},'',newurl);
                loadCategory('all');
            }
        }

        async function fetchNextBatch() {
            if (isFetching || isSearchMode) return;
            isFetching = true;
            
            // If queue is empty, fetch more into it from the periodic cache
            if (shuffledQueue.length === 0) {
                const batchSize = 120;
                const batch = await firestoreService.fetchGamesWithCache(currentCategory, batchSize);
                // Randomize this batch for the current session
                shuffledQueue = firestoreService.shuffleArray(batch);
                
                // Clear skeletons if present
                if (document.getElementById('scrollView').querySelector('.skeleton')) {
                    document.getElementById('scrollView').innerHTML = '';
                }
            }

            // Take next 24 from the randomized queue
            const batchToRender = shuffledQueue.splice(0, 24);
            renderGames(batchToRender, true);
            
            isFetching = false;
            // Hide load more if we still have games in the randomized pool
            document.getElementById('loadMoreContainer').style.display = (shuffledQueue.length > 0) ? 'block' : 'none';
        }

        function renderGames(games, append) {
            const container = document.getElementById('scrollView');
            if (!append) container.innerHTML = '';
            
            if (games.length === 0 && !append) {
                container.innerHTML = '<div class="col-12 text-center p-5"><p class="text-muted">No games found.</p></div>';
                return;
            }

            games.forEach(game => {
                const card = `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 p-2 animate-in">
                        <div class="game-card" onclick="window.open('/game/?id=${game.id}', '_self')">
                            <img src="${game.imageUrl}" loading="lazy" onerror="this.src='/images/cover.png'">
                            <h6>${game.name || game.title}</h6>
                            <span class="game-badge">${game.category && game.category[0] || 'Game'}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        document.getElementById('loadMoreBtn').onclick = fetchNextBatch;
        init();
    </script>
</body>
</html>
