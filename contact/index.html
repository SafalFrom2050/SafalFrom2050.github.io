<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../favicons/favicon.png">
    <title>Contact Us | alt games portal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link href="../css/bootstrap-4.0.0.css" rel="stylesheet">
    <link href="../style.css?v=1.3" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d32f2f;
            --primary-hover: #b71c1c;
            --bg-dark: #000;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* Glassmorphism Styling */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-form .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .contact-form label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
            transition: color 0.3s ease;
        }

        .contact-form .form-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: white;
            padding: 14px 18px;
            font-weight: 300;
            transition: all 0.3s ease;
        }

        .contact-form .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.3);
            outline: none;
        }

        .contact-form .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 36px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(211, 47, 47, 0.4);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .navbar.fixed-top {
            background: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(10px);
            height: 80px !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 !important;
        }


        .navbar-brand {
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(135deg, white, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 600;
            margin-left: 20px;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary) !important;
        }

        /* Micro-animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .contact-info {
            margin-top: 30px;
            font-size: 15px;
            color: var(--text-muted);
        }

        .contact-info a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    
    <!-- Navbar (Restored but styled) -->
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark card-glass">
        <div class="container">
            <a class="navbar-brand" href="/">alt games portal</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/privacy">Privacy</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/terms">Terms</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-10">
                <div class="glass-card animate-up">
                    <h1>Get in Touch</h1>
                    <p class="text-muted mb-4">Have a suggestion, found a bug, or just want to say hello? We'd love to hear from you.</p>
                    
                    <div class="mt-5 p-4 text-center" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 20px;">
                        <h4 class="mb-3" style="color: white; font-weight: 700;">Email Us Directly</h4>
                        <a href="mailto:safal.sharma.ss@gmail.com" class="btn-submit d-inline-block" style="text-decoration: none; width: auto; min-width: 250px;">safal.sharma.ss@gmail.com</a>
                        <p class="mt-4 text-muted" style="font-size: 0.9rem;">We typically respond to all inquiries within 24 hours.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/jquery-3.2.1.min.js"></script>
    <script src="../js/popper.min.js"></script> 
    <script src="../js/bootstrap-4.0.0.js"></script>
</body>
</html>
